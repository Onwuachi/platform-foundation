{{ define "main" }}
<style>
  .page-header { padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }
  .page-header h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .content { font-size: 0.925rem; color: var(--muted); line-height: 1.75; }
  .content h2 { font-size: 1rem; font-weight: 600; color: var(--text); margin: 2rem 0 0.6rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  .content h3 { font-size: 0.9rem; font-weight: 600; color: var(--text); margin: 1.2rem 0 0.3rem; }
  .content p { margin-bottom: 0.75rem; }
  .content ul { padding-left: 1.2rem; margin-bottom: 0.75rem; }
  .content li { margin-bottom: 0.3rem; }
  .content code { font-family: var(--mono); font-size: 0.825rem; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 0.1rem 0.35rem; color: var(--accent2); }
  .content a { color: var(--accent); }
</style>
<div class="page-header">
  <h1>{{ .Title }}</h1>
</div>
<div class="content">
  {{ .Content }}
</div>
{{ end }}
