global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: node

    ec2_sd_configs:
      - region: us-east-1
        port: 9100

    relabel_configs:
      - source_labels: [__meta_ec2_tag_Role]
        regex: ops
        action: keep

    static_configs:
      - targets: ['127.0.0.1:9100']    

  - job_name: platform-api
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:3000']

  - job_name: haproxy
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8404']

  - job_name: blackbox_https
    metrics_path: /probe
    params:
      module: [https]

    static_configs:
      - targets:
        - https://onwuachi.com
        - https://onwuachi.com/ready

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: localhost:9115

  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: pushgateway
    static_configs:
      - targets: ['127.0.0.1:9091']

  - job_name: 'blackbox_ssl'
    metrics_path: /probe
    params:
      module: [tls_expiry]

    static_configs:
      - targets:
          - https://onwuachi.com
          - https://www.onwuachi.com

    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__param_target]
        target_label: instance

      - target_label: __address__
        replacement: 127.0.0.1:9115