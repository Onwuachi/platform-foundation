groups:
- name: ssl-alerts
  rules:

  - alert: SSLCertificateExpiringSoon
    expr: (probe_ssl_earliest_cert_expiry - time()) < 86400 * 15
    for: 5m

    labels:
      severity: warning

    annotations:
      summary: "SSL cert expiring soon ({{ $labels.instance }})"
      description: "Certificate expires in less than 15 days"
