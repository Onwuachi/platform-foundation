{{ define "main" }}

<div class="card">
  <h1>🔥 Recipes</h1>
  <p>Pitmaster Knowledge Base</p>
</div>

<div class="card">
  <h3>Recipe Collection</h3>

  {{ range .Pages }}
    <div style="margin-bottom:1rem;">
      <a href="{{ .RelPermalink }}">
        <strong>{{ .Title }}</strong>
      </a>
    </div>
  {{ end }}

</div>

<div class="card">
  <h3>System Context</h3>
  <ul>
    <li>Type: Recipe Module</li>
    <li>Pipeline: Hugo Render Engine</li>
    <li>Recipes: {{ len .Pages }}</li>
  </ul>
</div>

{{ end }}
