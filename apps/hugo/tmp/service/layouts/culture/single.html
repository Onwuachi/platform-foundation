{{ define "main" }}

<div class="card">
  <div class="breadcrumb">
    <a href="/">Home</a> / <a href="/culture/">Culture</a> / {{ .Title }}
  </div>
  <h1>{{ .Title }}</h1>
  {{ if not .Date.IsZero }}
    <p class="post-date">{{ .Date.Format "January 2, 2006" }}</p>
  {{ end }}
</div>

<div class="card content-body">
  {{ .Content }}
</div>

<div class="side-note">
  <p><strong>As Platform Implementation Continues 🧠...</strong></p>
  <ul>
    {{ range site.Data.culture.links.anime_links }}
      <li><a href="{{ .url }}" target="_blank">{{ .name }}</a></li>
    {{ end }}
  </ul>
</div>

{{ end }}
