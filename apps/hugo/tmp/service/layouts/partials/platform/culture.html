<div class="card">
  <h2>🎬 Culture Module</h2>
  <p>Media + behavioral layer of the system</p>
</div>

<div class="side-note highlight-section">
  <p><strong>Onwuachi's Current Hits 🎬🔥</strong></p>
  <ul>
    {{ range site.Data.culture.links.favorites }}
      <li>{{ . }}</li>
    {{ end }}
  </ul>
</div>

<div class="grid-2">
  {{ range site.Data.culture.links.anime_links }}
    <div class="card">
      <h3>{{ .name }}</h3>
      <p>External reference link</p>
      <a href="{{ .url }}" target="_blank">Open →</a>
    </div>
  {{ end }}
</div>
