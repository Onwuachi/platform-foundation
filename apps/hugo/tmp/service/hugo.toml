baseURL = 'https://onwuachi.com/'
languageCode = 'en-us'
title = 'Onwuachi Control Plane'

# Ignore bak files
ignoreFiles = ['.*-bak$', '.*\.bak$']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allow raw HTML in markdown
  [markup.highlight]
    noClasses = false   # emit CSS classes (.chroma) instead of inline hex colors,
                          # so code blocks respect the light/dark theme toggle

[build]
  writeStats = true
