{{ define "main" }}

<div class="card">
  <h1>🔥 Pitmaster Runbooks</h1>
  <p style="color:var(--muted);">Operational guides for the smoker. Documented like production systems.</p>
</div>

<div class="recipe-grid">
  {{ range .RegularPagesRecursive.ByTitle }}
    <a href="{{ .RelPermalink }}" class="recipe-card">
      <div class="recipe-thumb"
        {{ with .Params.image }}style="background-image: url('{{ . }}');"{{ end }}
      ></div>
      <div class="recipe-body">
        <div class="recipe-title">{{ .Title }}</div>
        {{ if not .Date.IsZero }}
          <div class="recipe-date">{{ .Date.Format "Jan 2, 2006" }}</div>
        {{ end }}
      </div>
    </a>
  {{ end }}
</div>

{{ end }}
