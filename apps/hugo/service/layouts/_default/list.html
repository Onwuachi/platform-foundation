{{ define "main" }}

<div class="card">
  <h1>{{ .Title }}</h1>
  <p>Module Interface</p>
</div>

<div class="card">
  <h3>Entries</h3>

  {{ range .Pages }}
    <div style="margin-bottom:1rem;">
      <a href="{{ .RelPermalink }}"><strong>{{ .Title }}</strong></a>
    </div>
  {{ end }}

</div>

<div class="card">
  <h3>System Context</h3>
  <ul>
    <li>Type: Module</li>
    <li>Source: {{ .Section }}</li>
    <li>Count: {{ len .Pages }}</li>
  </ul>
</div>

{{ end }}
