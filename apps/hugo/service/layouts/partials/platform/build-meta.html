<div class="build-meta">
  <span class="badge badge-packer">🔨 Packer: Phase 4 — Control Plane</span>
  {{ with (getenv "HUGO_GIT_COMMIT") }}
    <span class="badge badge-commit">📦 Commit: {{ . }}</span>
  {{ else }}
    <span class="badge badge-commit" style="opacity:0.4;">📦 Commit: local</span>
  {{ end }}
  {{ with (getenv "HUGO_BUILD_TIME") }}
    <span class="badge badge-timestamp">🕐 Built: {{ . }}</span>
  {{ else }}
    <span class="badge badge-timestamp">🕐 Built: {{ now.Format "2006-01-02" }}</span>
  {{ end }}
</div>
