name: Build & Deploy Hugo Platform

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/hugo/**"
      - ".github/workflows/hugo-deploy.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: onwuachi-hugo-artifacts

    steps:
    ########################################
    # Checkout
    ########################################
    - name: Checkout repo
      uses: actions/checkout@v4

    ########################################
    # Build Hugo
    ########################################
    - name: Build Hugo site
      run: |
        cd apps/hugo/site

        docker run --rm \
          -v $(pwd):/site \
          -w /site \
          klakegg/hugo:ext \
          --minify

    ########################################
    # Configure AWS
    ########################################
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    ########################################
    # Upload Artifact to S3
    ########################################
    - name: Upload to S3
      run: |
        aws s3 sync apps/hugo/site/public \
          s3://$S3_BUCKET/ \
          --delete

    ########################################
    # (Optional) Trigger Infra Deploy
    ########################################
    - name: Terraform Apply (optional)
      if: false
      run: |
        cd infra/terraform
        terraform init
        terraform apply -auto-approve