name: platform-state-backup

on:
  schedule:
    # 2 AM Central / 07:00 UTC
    - cron: "0 7 * * *"

  workflow_dispatch:

jobs:
  backup-platform-state:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify source bucket
        run: |
          aws s3 ls s3://platform-api-services

      - name: Sync platform state backup
        run: |
          aws s3 sync \
            s3://platform-api-services \
            s3://platform-api-services-backup

      - name: Backup summary
        run: |
          echo "Backup completed:"
          aws s3 ls s3://platform-api-services-backup --recursive

