name: platform-down

on:
  workflow_dispatch:

  schedule:
    # 11:15 PM Central Time (CDT = UTC-5)
    - cron: '15 4 * * *'

permissions:
  id-token: write
  contents: read

jobs:
  platform-down:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::046685909731:role/github-oidc-role

      #################################################
      # LOG SCHEDULE + TIME CONTEXT
      #################################################
      - name: Log workflow timing
        run: |
          echo "======================================="
          echo " PLATFORM DOWN WORKFLOW"
          echo "======================================="

          echo "GitHub Event:"
          echo "${{ github.event_name }}"

          echo ""
          echo "UTC Time:"
          date -u

          echo ""
          echo "Central Time:"
          TZ=America/Chicago date

          echo ""
          echo "Expected Schedule:"
          echo "11:15 PM Central"
          echo "04:15 UTC"

      - name: Platform DOWN
        run: |
          chmod +x tools/platform
          ./tools/platform down

      - name: Verify EC2 stopped
        run: |
          echo "=== VERIFYING PLATFORM SHUTDOWN ==="

          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=platform-ops" \
            --query "Reservations[*].Instances[*].[State.Name]" \
            --output table


