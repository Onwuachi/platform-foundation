name: platform-up

on:
  workflow_dispatch:

  schedule:
    # 6:15 AM Central Time (CDT = UTC-5)
    - cron: '15 11 * * *'

permissions:
  id-token: write
  contents: read

jobs:
  up:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::046685909731:role/github-oidc-role

      - name: Platform UP
        run: |
          chmod +x ./tools/platform
          ./tools/platform up

      - name: Verify platform
        run: |
          echo "=== VERIFYING PLATFORM ==="

          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=platform-ops" \
            --query "Reservations[*].Instances[*].[State.Name,PublicIpAddress]" \
            --output table


