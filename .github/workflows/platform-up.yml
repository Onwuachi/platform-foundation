name: platform-up

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  up:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::046685909731:role/github-oidc-role

      - name: Platform Up
        run: |
          chmod +x ./tools/platform
          ./tools/platform up
    
