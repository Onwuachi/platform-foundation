<section class="grid-2">

  <div class="metric-card">
    <div class="metric-title">Platform Services</div>
    <div class="metric-value">{{ len site.Data.platform.services.services }}</div>
    <div class="metric-sub">haproxy · hugo · node-api</div>
  </div>

  <div class="metric-card">
    <div class="metric-title">Recovery Model</div>
    <div class="metric-value">Immutable</div>
    <div class="metric-sub">Packer AMIs + Terraform rehydration</div>
  </div>

  <div class="metric-card">
    <div class="metric-title">Edge Router</div>
    <div class="metric-value">HAProxy</div>
    <div class="metric-sub">TLS termination + dynamic routing</div>
  </div>

  <div class="metric-card">
    <div class="metric-title">State Backend</div>
    <div class="metric-value">S3</div>
    <div class="metric-sub">platform-api-services + daily snapshots</div>
  </div>

</section>
